services:
  postgres:
    image: postgres:16-alpine
    container_name: beatflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - beatflow_postgres_data:/var/lib/postgresql/data
    networks:
      - beatflow-network

  redis:
    image: redis:7-alpine
    container_name: beatflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - beatflow_redis_data:/data
    networks:
      - beatflow-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: beatflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - beatflow_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - beatflow-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: beatflow-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS}
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    volumes:
      - beatflow_elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - beatflow-network

  nginx:
    image: nginx:1.27-alpine
    container_name: beatflow-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    networks:
      - beatflow-network
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - elasticsearch

volumes:
  beatflow_postgres_data:
  beatflow_redis_data:
  beatflow_rabbitmq_data:
  beatflow_elasticsearch_data:

networks:
  beatflow-network:
    driver: bridge